{% extends 'base/admin_page_base.html' %}
{% load static %}
{% block admin_body %}

        <style>
            :root {
                --primary-color: #4f46e5;
                --primary-dark: #4338ca;
                --primary-light: #818cf8;
                --success-color: #10b981;
                --warning-color: #f59e0b;
                --danger-color: #ef4444;
                --info-color: #3b82f6;
                --dark-bg: #1e293b;
                --light-bg: #f8fafc;
                --card-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
                --card-shadow-hover: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            }

            * {
                transition: all 0.3s ease;
            }

            body {
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
                background: #f8fafc;
                min-height: 100vh;
            }

            .container {
                max-width: 1400px;
            }

            .card {
                border: none;
                border-radius: 16px;
                box-shadow: var(--card-shadow);
                overflow: hidden;
            }

            .card:hover {
                box-shadow: var(--card-shadow-hover);
                transform: translateY(-4px);
            }

            .btn {
                border-radius: 12px;
                padding: 10px 24px;
                font-weight: 600;
                border: none;
                transition: all 0.3s ease;
            }

            .btn-primary {
                background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
                color: white;
            }

            .btn-primary:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
            }

            .form-control, .form-select {
                border-radius: 12px;
                border: 2px solid #e2e8f0;
                padding: 12px 16px;
            }

            .form-control:focus, .form-select:focus {
                border-color: var(--primary-color);
                box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
            }

            .badge {
                padding: 6px 14px;
                border-radius: 20px;
                font-weight: 600;
            }

            .table {
                border-radius: 12px;
                overflow: hidden;
            }

            .table thead {
                background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-dark) 100%);
                color: white;
            }

            @media (max-width: 768px) {
                .container {
                    padding: 10px;
                }

                .card {
                    margin-bottom: 20px;
                }

                .btn {
                    width: 100%;
                    margin-bottom: 10px;
                }

                .table {
                    font-size: 12px;
                }

                .col-md-3, .col-md-9 {
                    padding: 0 10px;
                }
            }
        </style>



        <style>
            .requests-container {
                padding: 30px 0;
            }

            .requests-card {
                background: white;
                border-radius: 20px;
                padding: 30px;
                box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            }

            .requests-header {
                margin-bottom: 30px;
                padding-bottom: 20px;
                border-bottom: 2px solid #f1f5f9;
            }

            .requests-header h3 {
                font-size: 28px;
                font-weight: 700;
                color: #1e293b;
                margin: 0;
            }

            .table-modern {
                border-collapse: separate;
                border-spacing: 0;
                width: 100%;
                border-radius: 12px;
                overflow: hidden;
            }

            .table-modern thead {
                background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            }

            .table-modern thead th {
                color: white;
                font-weight: 600;
                padding: 16px;
                font-size: 14px;
                text-align: left;
                border: none;
            }

            .table-modern tbody tr {
                transition: all 0.3s ease;
                border-bottom: 1px solid #f1f5f9;
            }

            .table-modern tbody tr:hover {
                background: #f8fafc;
                transform: scale(1.01);
            }

            .table-modern tbody td {
                padding: 16px;
                vertical-align: middle;
                border: none;
            }

            .status-badge {
                padding: 6px 14px;
                border-radius: 20px;
                font-size: 12px;
                font-weight: 600;
                display: inline-block;
            }

            .status-badge.success {
                background: #d1fae5;
                color: #065f46;
            }

            .status-badge.danger {
                background: #fee2e2;
                color: #991b1b;
            }

            .status-badge.warning {
                background: #fef3c7;
                color: #92400e;
            }

            .status-badge.info {
                background: #dbeafe;
                color: #1e40af;
            }

            .status-badge.primary {
                background: #e0e7ff;
                color: #3730a3;
            }

            .status-badge.secondary {
                background: #f1f5f9;
                color: #475569;
            }

            .status-badge.orange {
                background: #ffedd5;
                color: #9a3412;
            }

            .status-badge.purple {
                background: #f3e8ff;
                color: #6b21a8;
            }

            .status-badge.teal {
                background: #ccfbf1;
                color: #115e59;
            }

            .status-badge.pink {
                background: #fce7f3;
                color: #9f1239;
            }

            .status-badge.indigo {
                background: #e0e7ff;
                color: #3730a3;
            }

            .action-button {
                padding: 6px 14px;
                border-radius: 8px;
                border: none;
                font-weight: 600;
                font-size: 12px;
                cursor: pointer;
                transition: all 0.3s ease;
                margin: 2px;
            }

            .action-button.renew {
                background: #10b981;
                color: white;
            }

            .action-button.renew:hover {
                background: #059669;
                transform: translateY(-2px);
            }

            .action-button.recall {
                background: #ef4444;
                color: white;
            }

            .action-button.recall:hover {
                background: #dc2626;
                transform: translateY(-2px);
            }

            .counter-cell {
                font-size: 9px;
                line-height: 1.4;
                white-space: normal;
                width: 100px !important;
            }

            .counter-cell span {
                display: block;
                margin: 1px 0;
            }

            @media (max-width: 768px) {
                .requests-container {
                    padding: 15px 0;
                }

                .requests-card {
                    padding: 20px;
                    overflow-x: auto;
                }

                .requests-header h3 {
                    font-size: 22px;
                }

                .table-modern {
                    font-size: 12px;
                }

                .table-modern thead th,
                .table-modern tbody td {
                    padding: 10px;
                    white-space: nowrap;
                }

                .counter-cell {
                    min-width: 90px;
                }

                .status-badge {
                    font-size: 10px;
                    padding: 4px 10px;
                }

                .action-button {
                    font-size: 10px;
                    padding: 4px 10px;
                }
            }
        </style>










            <style>
                .sidebar-modern {
                    background: white;
                    border-radius: 20px;
                    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
                    overflow: hidden;
                    position: sticky;
                    top: 20px;
                }

                .user-profile-modern {
                    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                    padding: 30px 20px;
                    text-align: center;
                    position: relative;
                }

                .user-profile-modern::before {
                    content: '';
                    position: absolute;
                    top: 0;
                    left: 0;
                    right: 0;
                    bottom: 0;
                    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
                    opacity: 0.4;
                }

                .user-avatar-modern {
                    width: 100px;
                    height: 100px;
                    border-radius: 50%;
                    border: 4px solid white;
                    box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);
                    object-fit: cover;
                    position: relative;
                    z-index: 1;
                }

                .user-info-modern {
                    color: white;
                    margin-top: 15px;
                    position: relative;
                    z-index: 1;
                }

                .user-info-modern h6 {
                    font-size: 18px;
                    font-weight: 700;
                    margin-bottom: 8px;
                }

                .user-info-modern p {
                    font-size: 13px;
                    opacity: 0.95;
                    margin-bottom: 4px;
                }

                .nav-modern {
                    padding: 10px 0;
                }

                .nav-modern .nav-item {
                    margin: 0;
                }

                .nav-modern .nav-link {
                    color: #64748b;
                    padding: 14px 24px;
                    display: flex;
                    align-items: center;
                    font-weight: 500;
                    font-size: 15px;
                    border-left: 3px solid transparent;
                    transition: all 0.3s ease;
                }

                .nav-modern .nav-link i {
                    font-size: 20px;
                    margin-right: 12px;
                    width: 24px;
                    text-align: center;
                }

                .nav-modern .nav-link:hover,
                .nav-modern .nav-link.active {
                    background: linear-gradient(90deg, rgba(102, 126, 234, 0.08) 0%, transparent 100%);
                    color: #667eea;
                    border-left-color: #667eea;
                }

                @media (max-width: 768px) {
                    .sidebar-modern {
                        margin-bottom: 20px;
                        position: static;
                    }

                    .user-profile-modern {
                        padding: 20px 15px;
                    }

                    .user-avatar-modern {
                        width: 80px;
                        height: 80px;
                    }

                    .user-info-modern h6 {
                        font-size: 16px;
                    }

                    .user-info-modern p {
                        font-size: 12px;
                    }

                    .nav-modern .nav-link {
                        padding: 12px 20px;
                        font-size: 14px;
                    }

                    .nav-modern .nav-link i {
                        font-size: 18px;
                        margin-right: 10px;
                    }
                }
            </style>

            <div class="col-md-9">
                <div class="requests-card">
                    <div class="requests-header">
                        <h3>
                            <img width="27" height="27" src="https://img.icons8.com/color/48/rules.png" alt="rules"/> So'rovnomalar
                        </h3>
                    </div>

                    <div class="table-responsive">
                        <div class="dataTables_wrapper dt-bootstrap4 no-footer">

                            <table class="table-modern">
                                <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Operator</th>
                                    <th>Sana</th>
                                    <th>Oqim</th>
                                    <th>Haridor</th>
                                    <th>Viloyat</th>
                                    <th>Telefon</th>
                                    <th>Holati</th>
                                    <th>Izoh</th>
                                </tr>
                                </thead>
                                <tbody>

                                <tr>
                                    <td colspan="8" style="text-align: center; padding: 40px; color: #64748b;">
                                        <img width="50" height="50" src="https://img.icons8.com/color/48/rules.png" alt="rules"/>
                                        <strong>Hozircha so'rovnomalar mavjud emas</strong>
                                    </td>
                                </tr>

                                </tbody>
                            </table>

                        </div>
                    </div>
                </div>
            </div>






{% endblock %}
